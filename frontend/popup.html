<!DOCTYPE html>
<html>
<head>
  <title>SelectSpeak</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <div class="header">
      <div>
        <h1>SelectSpeak</h1>
        <p class="subtitle">Read selected text with smart voice control</p>
      </div>
    </div>

    <div class="main-panel">
      <div class="left-panel">
        <p class="info-line">
          <span class="label">Detected Language</span>
          <span id="languageText" class="value-pill">None yet</span>
        </p>

        <button id="detectButton" class="secondary-button full-width-button detect-button">Detect Selected Text</button>

        <div class="setting-group">
          <label for="voiceMode">Voice Mode</label>
          <select id="voiceMode">
            <option value="auto">Auto Detect</option>
            <option value="manual">Manual Voice</option>
          </select>
        </div>

        <div class="setting-group">
          <label for="voiceSelect">Voice Options</label>
          <select id="voiceSelect">
            <option value="auto">Auto choose best voice</option>
          </select>
        </div>
      </div>

      <div class="divider"></div>

      <div class="right-panel">
        <h2>Voice Preview</h2>

        <div class="preview-card">
          <p class="small-label">Selected Voice</p>
          <p id="selectedVoiceText">Auto choose best voice</p>

          <p class="small-label">Preview Text</p>
          <p id="previewText">Hello, this is a short voice preview.</p>
        </div>

        <div class="button-row">
          <button id="previewButton" class="secondary-button">Preview Voice</button>
        </div>
      </div>
    </div>

    <div class="bottom-panel">
      <div class="setting-group">
        <div class="speed-header">
          <label for="speedSlider">Speed</label>
          <span id="speedValue" class="speed-pill">1.0x</span>
        </div>

        <input
          type="range"
          id="speedSlider"
          min="0.5"
          max="2"
          step="0.1"
          value="1"
        >
      </div>

      <button id="speakButton" class="primary-button">Speak Selected Text</button>
      <button id="stopButton" class="danger-button full-width-button">Stop Reading</button>
      <p id="statusText">Select text on a webpage, then click Speak Selected Text.</p>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
